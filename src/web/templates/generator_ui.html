<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anomaly Injector | Test Bench</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --neon-blue: #00d2ff;
            --neon-purple: #9d50bb;
            --accent-color: #ff3366;
        }
        
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #fff;
            min-height: 100vh;
            font-family: 'Outfit', sans-serif;
            padding-top: 50px;
        }
        
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            margin-bottom: 20px;
        }
        
        h1 {
            font-weight: 600;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }
        
        .form-label { font-weight: 600; color: #aaa; }
        .form-control {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            border-radius: 10px;
        }
        .form-control:focus {
            background: rgba(0, 0, 0, 0.5);
            color: #fff;
            box-shadow: 0 0 15px var(--neon-blue);
            border-color: var(--neon-blue);
        }
        
        .btn-spike {
            background: linear-gradient(45deg, #ff3366, #ff6a00);
            border: none;
            border-radius: 12px;
            font-weight: 600;
            padding: 12px 25px;
            transition: all 0.3s ease;
        }
        .btn-spike:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 51, 102, 0.5);
        }
        
        .status-badge {
            font-size: 0.8rem;
            padding: 5px 12px;
            border-radius: 20px;
        }
        
        .slider-label {
            display: flex;
            justify-content: space-between;
        }
        
        .active-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 10px currentColor;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="glass-card mb-4 text-center">
                    <h1>Anomaly Injector <small class="fs-6 text-muted">v1.0</small></h1>
                    <p class="text-muted">Инструмент для стресс-тестирования алгоритмов обнаружения аномалий</p>
                </div>

                <div class="row">
                    <!-- Настройки устройства -->
                    <div class="col-md-6">
                        <div class="glass-card h-100">
                            <h4 class="mb-4">Настройки MQTT</h4>
                            <div class="mb-3">
                                <label class="form-label">Устройство (device_id)</label>
                                <input type="text" id="device_id" list="device_list" class="form-control" placeholder="Поиск или ввод устройства...">
                                <datalist id="device_list"></datalist>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Тег (tag_name)</label>
                                <input type="text" id="tag_name" list="tag_list" class="form-control" placeholder="Поиск или ввод тега...">
                                <datalist id="tag_list"></datalist>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Группа (group_id)</label>
                                <input type="text" id="group_id" list="group_list" class="form-control" value="test_group">
                                <datalist id="group_list"></datalist>
                            </div>
                        </div>
                    </div>

                    <!-- Параметры сигнала -->
                    <div class="col-md-6">
                        <div class="glass-card h-100">
                            <h4 class="mb-4">Формирование сигнала</h4>
                            <div class="mb-4 d-flex justify-content-between align-items-center">
                                <div class="slider-label">
                                    <label class="form-label">Базовое значение</label>
                                    <span id="base_value_info" class="text-info">50.0</span>
                                </div>
                                <div class="form-check form-switch col-auto">
                                    <input class="form-check-input" type="checkbox" id="setting-capture" onchange="toggleCapture()">
                                    <label class="form-check-label text-muted small" for="setting-capture">Захват из сети</label>
                                </div>
                            </div>
                            <input type="range" class="form-range" id="base_value" min="0" max="1000" step="1" value="50">
                            <div class="mb-4">
                                <div class="slider-label">
                                    <label class="form-label">Шум (Noise)</label>
                                    <span id="noise_info" class="text-warning">0.0</span>
                                </div>
                                <input type="range" class="form-range" id="noise" min="0" max="100" step="0.1" value="0.0">
                            </div>
                            <div class="mb-4">
                                <div class="slider-label">
                                    <label class="form-label">Дрейф (Drift per sec)</label>
                                    <span id="drift_info" class="text-success">0.0</span>
                                </div>
                                <input type="range" class="form-range" id="drift" min="-5" max="5" step="0.01" value="0.0">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Управление инъекцией -->
                <div class="glass-card mt-4">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <button id="toggle-active" class="btn btn-outline-info me-3">Запустить генерацию</button>
                            <span id="status-badge" class="badge bg-secondary">ОСТАНОВЛЕНО</span>
                        </div>
                        <div class="d-flex align-items-center">
                            <input type="number" id="spike_amplitude" class="form-control me-2" placeholder="Амплитуда" value="50" style="width: 100px;">
                            <button onclick="injectSpike()" class="btn btn-spike">ВБРОСИТЬ SPIKE</button>
                        </div>
                    </div>
                </div>
                
                <p class="text-center mt-3 text-muted x-small">Данные отправляются на broker.hivemq.com:1883</p>
            </div>
        </div>
    </div>

    <script>
        let isActive = false;
        let devicesData = [];

        // Инициализация: загрузка устройств
        async function loadDevices() {
            try {
                const response = await fetch('/api/devices');
                devicesData = await response.json();
                
                const list = document.getElementById('device_list');
                const groupList = document.getElementById('group_list');
                
                list.innerHTML = '';
                groupList.innerHTML = '';
                
                const uniqueGroups = new Set();
                
                devicesData.forEach(dev => {
                    const opt = document.createElement('option');
                    opt.value = dev.device_id;
                    list.appendChild(opt);
                    
                    if (dev.group_id) uniqueGroups.add(dev.group_id);
                });
                
                uniqueGroups.forEach(group => {
                    const opt = document.createElement('option');
                    opt.value = group;
                    groupList.appendChild(opt);
                });
            } catch (err) {
                console.error("Failed to load devices:", err);
            }
        }

        // Загрузка тегов при выборе устройства
        document.getElementById('device_id').addEventListener('input', async (e) => {
            const deviceId = e.target.value;
            if (!deviceId) return;
            
            // Находим группу устройства из загруженных данных
            const deviceInfo = devicesData.find(d => d.device_id === deviceId);
            if (deviceInfo) {
                document.getElementById('group_id').value = deviceInfo.group_id;
            }

            try {
                const response = await fetch(`/api/tags/${deviceId}`);
                const tags = await response.json();
                
                const list = document.getElementById('tag_list');
                list.innerHTML = '';
                
                tags.forEach(tag => {
                    const opt = document.createElement('option');
                    opt.value = tag.tag_name;
                    list.appendChild(opt);
                });
                
                updateConfiguration();
            } catch (err) {
                console.error("Failed to load tags:", err);
            }
        });

        document.getElementById('tag_name').addEventListener('input', updateConfiguration);
        document.getElementById('group_id').addEventListener('input', updateConfiguration);

        // Обновление отображения значений ползунков
        ['base_value', 'noise', 'drift'].forEach(id => {
            const el = document.getElementById(id);
            el.addEventListener('input', () => {
                document.getElementById(id + '_info').innerText = el.value;
                updateConfiguration();
            });
        });

        async function updateConfiguration() {
            const deviceId = document.getElementById('device_id').value;
            const tagName = document.getElementById('tag_name').value;
            
            if (!deviceId || !tagName) return;

            const config = {
                active: isActive,
                device_id: deviceId,
                tag_name: tagName,
                group_id: document.getElementById('group_id').value,
                base_value: parseFloat(document.getElementById('base_value').value),
                noise: parseFloat(document.getElementById('noise').value),
                drift: parseFloat(document.getElementById('drift').value)
            };

            await fetch('/api/configure', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(config)
            });
        }

        document.getElementById('toggle-active').addEventListener('click', async () => {
            if (!document.getElementById('device_id').value) {
                alert("Сначала выберите устройство!");
                return;
            }
            
            isActive = !isActive;
            const btn = document.getElementById('toggle-active');
            const badge = document.getElementById('status-badge');
            
            if (isActive) {
                btn.innerText = 'Остановить генерацию';
                btn.classList.replace('btn-outline-info', 'btn-info');
                badge.innerText = 'АКТИВНО';
                badge.classList.replace('bg-secondary', 'bg-success');
            } else {
                btn.innerText = 'Запустить генерацию';
                btn.classList.replace('btn-info', 'btn-outline-info');
                badge.innerText = 'ОСТАНОВЛЕНО';
                badge.classList.replace('bg-success', 'bg-secondary');
            }
            updateConfiguration();
        });

        async function injectSpike() {
            if (!document.getElementById('device_id').value) {
                alert("Сначала выберите устройство!");
                return;
            }
            const amplitude = document.getElementById('spike_amplitude').value;
            await fetch('/api/inject_spike', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ amplitude: parseFloat(amplitude) })
            });
        }

        // Инициализация при загрузке
        loadDevices();
        loadSettings();

        async function loadSettings() {
            try {
                const response = await fetch('/api/settings');
                const data = await response.json();
                document.getElementById('setting-capture').checked = data.traffic_capture_enabled === 'true';
            } catch (err) {
                console.error("Failed to load settings:", err);
            }
        }

        async function toggleCapture() {
            const enabled = document.getElementById('setting-capture').checked;
            try {
                await fetch('/api/settings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ traffic_capture_enabled: enabled ? 'true' : 'false' })
                });
            } catch (err) {
                console.error("Failed to toggle capture:", err);
            }
        }
    </script>
</body>
</html>
